<script>
(function(){
  function applyFinalRecommendOverride() {
    if (window.__SSQ_FINAL_RECOMMEND_OVERRIDE_APPLIED__) return;
    window.__SSQ_FINAL_RECOMMEND_OVERRIDE_APPLIED__ = true;

    const originalCandidateProfile = candidateProfile;
    candidateProfile = function(reds, blue, opts = state.recommend.options) {
      const p = originalCandidateProfile(reds, blue, opts);
      p.scoreKey = `${p.scoreBand.min}-${p.scoreBand.max}`;
      p.prevalenceKey = `${p.prevalenceBand.min}-${p.prevalenceBand.max}`;
      p.balanceKey = `${p.balanceBand.min}-${p.balanceBand.max}`;
      p.comboKey = `${p.scoreKey}|${p.prevalenceKey}|${p.balanceKey}`;
      const recBase = Math.floor((p.recommendScore || 0) / 3) * 3;
      const fitBase = Math.floor((p.bandFit || 0) / 5) * 5;
      p.recommendBucket = `${recBase}-${Math.min(99, recBase + 2)}`;
      p.fitBucket = `${fitBase}-${Math.min(100, fitBase + 4)}`;
      return p;
    };

    function axisKeyForItem(axis, item) {
      return axis === 'score' ? item.scoreKey : axis === 'prevalence' ? item.prevalenceKey : item.balanceKey;
    }

    function sortBandKeys(keys) {
      return [...keys].sort((a, b) => {
        const am = Number(String(a).split('-')[0] || 0);
        const bm = Number(String(b).split('-')[0] || 0);
        return am - bm || String(a).localeCompare(String(b), 'zh-CN');
      });
    }

    function allocateAxisBandTargets(axis, total = 5) {
      const system = bandSystemV6 && bandSystemV6[axis];
      const topBands = system && system.sortedByRate ? system.sortedByRate.slice(0, 3) : [];
      const picked = topBands.length ? topBands : (system && system.bands ? system.bands.slice(0, Math.min(3, system.bands.length)) : []);
      if (!picked.length) return {};
      const targets = {};
      const baseCount = Math.min(total, picked.length);
      for (let i = 0; i < baseCount; i++) {
        const key = `${picked[i].min}-${picked[i].max}`;
        targets[key] = 1;
      }
      let remaining = total - baseCount;
      while (remaining > 0) {
        let bestKey = null;
        let bestScore = -Infinity;
        for (const band of picked) {
          const key = `${band.min}-${band.max}`;
          const current = targets[key] || 0;
          if (current >= 3) continue;
          const score = (band.rate || 0) / (current + 0.85);
          if (score > bestScore) {
            bestScore = score;
            bestKey = key;
          }
        }
        if (!bestKey) break;
        targets[bestKey] = (targets[bestKey] || 0) + 1;
        remaining -= 1;
      }
      return targets;
    }

    function emptyTracker() {
      return {
        red: Object.create(null),
        blue: Object.create(null),
        score: Object.create(null),
        prevalence: Object.create(null),
        balance: Object.create(null),
        combo: Object.create(null),
        recommendBucket: Object.create(null),
        fitBucket: Object.create(null),
      };
    }

    function bump(map, key, delta = 1) {
      map[key] = (map[key] || 0) + delta;
    }

    function addToTracker(tracker, item) {
      item.reds.forEach(n => bump(tracker.red, n));
      bump(tracker.blue, item.blue);
      bump(tracker.score, item.scoreKey);
      bump(tracker.prevalence, item.prevalenceKey);
      bump(tracker.balance, item.balanceKey);
      bump(tracker.combo, item.comboKey);
      bump(tracker.recommendBucket, item.recommendBucket);
      bump(tracker.fitBucket, item.fitBucket);
    }

    function getAxisNeed(axis, item, tracker, targets) {
      const key = axisKeyForItem(axis, item);
      return (targets[axis][key] || 0) - (tracker[axis][key] || 0);
    }

    function repeatPenaltyForReds(item, tracker) {
      let penalty = 0;
      for (const n of item.reds) {
        const c = tracker.red[n] || 0;
        if (c >= 2) return Number.POSITIVE_INFINITY;
        if (c === 1) penalty += 36;
      }
      return penalty;
    }

    function overlapPenalty(item, selected) {
      let penalty = 0;
      for (const s of selected) {
        const ov = countOverlap(s.reds, item.reds);
        if (ov >= 5) return Number.POSITIVE_INFINITY;
        if (ov === 4) penalty += 420;
        else if (ov === 3) penalty += 170;
        else if (ov === 2) penalty += 48;
      }
      return penalty;
    }

    function scoreItemForSet(item, selected, tracker, targets) {
      const redPenalty = repeatPenaltyForReds(item, tracker);
      if (!Number.isFinite(redPenalty)) return -Infinity;
      const ovPenalty = overlapPenalty(item, selected);
      if (!Number.isFinite(ovPenalty)) return -Infinity;

      let scoreValue =
        (item.recommendScore || 0) * 100 +
        (item.bandFit || 0) * 9 +
        (item.score || 0) * 4 +
        (item.prevalence || 0) * 2 +
        (item.balance || 0);

      const scoreNeed = getAxisNeed('score', item, tracker, targets);
      const prevalenceNeed = getAxisNeed('prevalence', item, tracker, targets);
      const balanceNeed = getAxisNeed('balance', item, tracker, targets);

      scoreValue += scoreNeed > 0 ? scoreNeed * 115 : scoreNeed * 80;
      scoreValue += prevalenceNeed > 0 ? prevalenceNeed * 105 : prevalenceNeed * 72;
      scoreValue += balanceNeed > 0 ? balanceNeed * 95 : balanceNeed * 66;

      const comboCount = tracker.combo[item.comboKey] || 0;
      const scoreBandCount = tracker.score[item.scoreKey] || 0;
      const prevalenceBandCount = tracker.prevalence[item.prevalenceKey] || 0;
      const balanceBandCount = tracker.balance[item.balanceKey] || 0;
      const recBucketCount = tracker.recommendBucket[item.recommendBucket] || 0;
      const fitBucketCount = tracker.fitBucket[item.fitBucket] || 0;
      const blueCount = tracker.blue[item.blue] || 0;

      if (comboCount >= 1) scoreValue -= 240 + comboCount * 70;
      if (scoreBandCount >= 2) scoreValue -= 150 + scoreBandCount * 60;
      if (prevalenceBandCount >= 2) scoreValue -= 120 + prevalenceBandCount * 48;
      if (balanceBandCount >= 2) scoreValue -= 110 + balanceBandCount * 42;
      if (recBucketCount >= 2) scoreValue -= 90 + recBucketCount * 34;
      if (fitBucketCount >= 2) scoreValue -= 75 + fitBucketCount * 28;
      if (blueCount >= 1) scoreValue -= 42 + blueCount * 30;

      scoreValue -= redPenalty;
      scoreValue -= ovPenalty;
      return scoreValue;
    }

    function relaxedBackfillScore(item, selected, tracker) {
      let scoreValue =
        (item.recommendScore || 0) * 100 +
        (item.bandFit || 0) * 8 +
        (item.score || 0) * 3;

      let redPenalty = 0;
      for (const n of item.reds) {
        const c = tracker.red[n] || 0;
        if (c >= 3) return -Infinity;
        redPenalty += c * 32;
      }
      scoreValue -= redPenalty;

      for (const s of selected) {
        const ov = countOverlap(s.reds, item.reds);
        if (ov >= 5) return -Infinity;
        if (ov === 4) scoreValue -= 260;
        else if (ov === 3) scoreValue -= 120;
        else if (ov === 2) scoreValue -= 30;
      }

      scoreValue -= (tracker.combo[item.comboKey] || 0) * 140;
      scoreValue -= (tracker.score[item.scoreKey] || 0) * 52;
      scoreValue -= (tracker.prevalence[item.prevalenceKey] || 0) * 42;
      scoreValue -= (tracker.balance[item.balanceKey] || 0) * 38;
      scoreValue -= (tracker.blue[item.blue] || 0) * 36;
      return scoreValue;
    }

    function chooseRecommendationSet(ranked, total = 5) {
      const shortlist = ranked.slice(0, Math.min(1200, ranked.length));
      const targets = {
        score: allocateAxisBandTargets('score', total),
        prevalence: allocateAxisBandTargets('prevalence', total),
        balance: allocateAxisBandTargets('balance', total),
      };
      const selected = [];
      const tracker = emptyTracker();
      const chosenKeys = new Set();

      while (selected.length < total) {
        let best = null;
        let bestValue = -Infinity;
        for (const item of shortlist) {
          if (chosenKeys.has(item.key)) continue;
          const value = scoreItemForSet(item, selected, tracker, targets);
          if (value > bestValue) {
            bestValue = value;
            best = item;
          }
        }
        if (!best) break;
        selected.push(best);
        chosenKeys.add(best.key);
        addToTracker(tracker, best);
      }

      if (selected.length < total) {
        const fallback = ranked
          .filter(item => !chosenKeys.has(item.key))
          .map(item => ({ item, value: relaxedBackfillScore(item, selected, tracker) }))
          .filter(x => Number.isFinite(x.value))
          .sort((a, b) => b.value - a.value)
          .map(x => x.item);

        for (const item of fallback) {
          if (selected.length >= total) break;
          if (chosenKeys.has(item.key)) continue;
          selected.push(item);
          chosenKeys.add(item.key);
          addToTracker(tracker, item);
        }
      }

      return { selected, targets, tracker };
    }

    function summarizeRecommendMeta(selected, targets, tracker, poolSize) {
      const toSortedMap = map => {
        const keys = sortBandKeys(Object.keys(map));
        const out = {};
        keys.forEach(k => { out[k] = map[k]; });
        return out;
      };
      return {
        poolSize,
        targets: {
          score: toSortedMap(targets.score),
          prevalence: toSortedMap(targets.prevalence),
          balance: toSortedMap(targets.balance),
        },
        actual: {
          score: toSortedMap(tracker.score),
          prevalence: toSortedMap(tracker.prevalence),
          balance: toSortedMap(tracker.balance),
        },
        repeatedReds: Object.entries(tracker.red).filter(([, c]) => c >= 2).sort((a, b) => b[1] - a[1] || Number(a[0]) - Number(b[0])),
        repeatedBlues: Object.entries(tracker.blue).filter(([, c]) => c >= 2).sort((a, b) => b[1] - a[1] || Number(a[0]) - Number(b[0])),
        combos: Object.entries(tracker.combo).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN')).slice(0, 5),
        uniqueRedCount: Object.keys(tracker.red).length,
      };
    }

    function renderAxisTargetLine(title, actualMap, targetMap) {
      const keys = sortBandKeys(new Set([...(Object.keys(targetMap || {})), ...(Object.keys(actualMap || {}))]));
      if (!keys.length) return '';
      const pills = keys.map(key => {
        const actual = actualMap && actualMap[key] ? actualMap[key] : 0;
        const target = targetMap && targetMap[key] ? targetMap[key] : 0;
        const tone = actual > target ? 'yellow' : actual === target && actual > 0 ? 'green' : actual > 0 ? 'blue' : 'default';
        return labelPill(`${key} 实际 ${actual} / 目标 ${target}`, tone);
      }).join('');
      return `<div style="margin-top:10px"><div class="helper">${escapeHtml(title)}</div><div class="pill-wrap" style="margin-top:8px">${pills}</div></div>`;
    }

    function renderRecommendMetaSummary(meta) {
      if (!meta) return '';
      const repeatedReds = meta.repeatedReds && meta.repeatedReds.length
        ? meta.repeatedReds.map(([n, c]) => labelPill(`${String(n).padStart(2, '0')} × ${c}`, 'yellow')).join('')
        : labelPill('红球无明显重复堆积', 'green');
      const repeatedBlues = meta.repeatedBlues && meta.repeatedBlues.length
        ? meta.repeatedBlues.map(([n, c]) => labelPill(`${String(n).padStart(2, '0')} × ${c}`, 'yellow')).join('')
        : labelPill('蓝球无明显重复堆积', 'green');
      const comboPills = meta.combos && meta.combos.length
        ? meta.combos.map(([k, c]) => labelPill(`${k.replaceAll('|', ' / ')} × ${c}`, c > 1 ? 'yellow' : 'blue')).join('')
        : labelPill('三轴带组合无重复', 'green');
      return `
        <div class="card" style="margin-bottom:14px">
          <div class="section-head"><h3>推荐集分层校正</h3><div class="sub">这一版不再只在同一个高分簇里截 5 组，而是对综合评分带、常见度带、均衡度带做显式目标配额，并限制重复红球与重复带型。</div></div>
          <div class="metric-grid">
            <div class="metric"><div class="k">候选池规模</div><div class="v">${meta.poolSize}</div></div>
            <div class="metric"><div class="k">5 组独立红球数</div><div class="v">${meta.uniqueRedCount}</div></div>
            <div class="metric"><div class="k">重复红球</div><div class="v">${meta.repeatedReds ? meta.repeatedReds.length : 0}</div></div>
            <div class="metric"><div class="k">重复蓝球</div><div class="v">${meta.repeatedBlues ? meta.repeatedBlues.length : 0}</div></div>
          </div>
          ${renderAxisTargetLine('综合评分带：实际 vs 目标', meta.actual.score, meta.targets.score)}
          ${renderAxisTargetLine('历史常见度带：实际 vs 目标', meta.actual.prevalence, meta.targets.prevalence)}
          ${renderAxisTargetLine('结构均衡度带：实际 vs 目标', meta.actual.balance, meta.targets.balance)}
          <div style="margin-top:10px"><div class="helper">高频重复红球</div><div class="pill-wrap" style="margin-top:8px">${repeatedReds}</div></div>
          <div style="margin-top:10px"><div class="helper">高频重复蓝球</div><div class="pill-wrap" style="margin-top:8px">${repeatedBlues}</div></div>
          <div style="margin-top:10px"><div class="helper">三轴带组合</div><div class="pill-wrap" style="margin-top:8px">${comboPills}</div></div>
        </div>
      `;
    }

    generateRecommendations = function() {
      state.recommend.options = readRecommendOptions();
      const opts = state.recommend.options;
      const pool = [];
      const seen = new Set();
      const attempts = opts.preferBalanced ? 18000 : 15000;

      for (let i = 0; i < attempts; i++) {
        const cand = randomCandidate();
        const profile = candidateProfile(cand.reds, cand.blue, opts);
        if (profile.ruleHits.length) continue;
        if (seen.has(profile.key)) continue;
        seen.add(profile.key);
        pool.push(profile);
      }

      const ranked = pool.sort((a, b) =>
        (b.recommendScore || 0) - (a.recommendScore || 0) ||
        (b.bandFit || 0) - (a.bandFit || 0) ||
        (b.score || 0) - (a.score || 0) ||
        (b.prevalence || 0) - (a.prevalence || 0) ||
        (b.balance || 0) - (a.balance || 0) ||
        a.key.localeCompare(b.key, 'zh-CN')
      );

      const chosen = chooseRecommendationSet(ranked, 5);
      state.recommend.meta = summarizeRecommendMeta(chosen.selected, chosen.targets, chosen.tracker, pool.length);
      state.recommend.lastList = sortRecommendList(chosen.selected, state.recommend.sort || 'recommend_desc');
      renderTabContent();
    };

    renderRecommendResult = function() {
      if (!state.recommend.lastList.length) {
        return '<div class="empty">点击“推荐 5 组”后，这里显示结果。当前版本会显式校正三条评分轴的评分带分布，并限制高频重复红球。</div>';
      }
      const list = sortRecommendList(state.recommend.lastList, state.recommend.sort || 'recommend_desc');
      return `${renderRecommendMetaSummary(state.recommend.meta)}<div class="accordion-list">${list.map((item, idx) => renderRecommendationAccordion(item, idx)).join('')}</div>`;
    };

    state.recommend.sort = state.recommend.sort || 'recommend_desc';
    if (state.tab === 'recommend') renderTabContent();
  }

  function waitForAppReady() {
    if (typeof state !== 'undefined' &&
        typeof candidateProfile === 'function' &&
        typeof randomCandidate === 'function' &&
        typeof bandSystemV6 !== 'undefined' &&
        typeof renderTabContent === 'function') {
      applyFinalRecommendOverride();
      return;
    }
    setTimeout(waitForAppReady, 60);
  }

  waitForAppReady();
})();
</script>

</body>
