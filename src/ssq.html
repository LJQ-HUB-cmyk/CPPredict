<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>双色球个人分析台 - 单文件版</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-2: #0d1830;
      --card: rgba(18, 28, 54, 0.92);
      --card-2: rgba(22, 35, 67, 0.98);
      --line: rgba(255,255,255,.08);
      --line-2: rgba(255,255,255,.14);
      --text: #eef4ff;
      --muted: #9fb0df;
      --primary: #6ea8fe;
      --primary-2: #8fd3ff;
      --green: #6ee7b7;
      --red: #fb7185;
      --yellow: #fbbf24;
      --shadow: 0 20px 55px rgba(0,0,0,.28);
      --radius: 18px;
      --radius-sm: 14px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #06101d 0%, #0a1326 55%, #0b152b 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select { font: inherit; }
    .app { max-width: 1320px; margin: 0 auto; padding: 20px; }
    .hero {
      background: radial-gradient(circle at top right, rgba(110,168,254,.18), transparent 34%), linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .hero h1 { margin: 0; font-size: 30px; line-height: 1.15; }
    .hero p { margin: 10px 0 0; color: var(--muted); line-height: 1.7; }
    .hero-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(110,168,254,.08);
      border: 1px solid rgba(110,168,254,.2);
      color: #dfe9ff;
      line-height: 1.65;
    }
    .tabbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 15px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      cursor: pointer;
      transition: .15s ease;
    }
    .tab-btn:hover { background: rgba(255,255,255,.06); transform: translateY(-1px); }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(110,168,254,.34), rgba(143,211,255,.18));
      border-color: rgba(110,168,254,.5);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .stat-card, .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .stat-card { padding: 16px 18px; }
    .stat-card .label { color: var(--muted); font-size: 13px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 10px; }
    .stat-card .sub { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.55; }
    .main { margin-top: 16px; display: grid; gap: 16px; }
    .section-card { padding: 18px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .section-head h2, .section-head h3, .section-head h4 {
      margin: 0;
      font-size: 20px;
    }
    .section-head .sub { color: var(--muted); font-size: 13px; }
    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }
    .toolbar-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .input, .select {
      min-width: 180px;
      width: 100%;
      padding: 11px 13px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline: none;
    }
    .input.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .btn {
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(110,168,254,.36), rgba(143,211,255,.18));
      color: #fff;
      cursor: pointer;
    }
    .btn.secondary { background: rgba(255,255,255,.04); border-color: var(--line); color: var(--text); }
    .btn.small { padding: 8px 12px; font-size: 13px; border-radius: 12px; }
    .helper { color: var(--muted); font-size: 13px; line-height: 1.65; }
    .pill-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      color: #dbe6ff;
    }
    .pill.blue { background: rgba(110,168,254,.12); border-color: rgba(110,168,254,.28); }
    .pill.green { background: rgba(110,231,183,.12); border-color: rgba(110,231,183,.28); }
    .pill.red { background: rgba(251,113,133,.12); border-color: rgba(251,113,133,.28); }
    .pill.yellow { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.28); }
    .balls { display: flex; flex-wrap: wrap; gap: 8px; }
    .ball {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }
    .ball.red { background: linear-gradient(135deg, #fb7185, #ef4444); }
    .ball.blue { background: linear-gradient(135deg, #60a5fa, #2563eb); }
    .accordion-list { display: grid; gap: 10px; }
    details.acc {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.025);
      overflow: hidden;
    }
    details.acc > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    details.acc > summary::-webkit-details-marker { display: none; }
    details.acc[open] > summary { background: rgba(255,255,255,.025); border-bottom: 1px solid var(--line); }
    .acc-left { min-width: 0; display: grid; gap: 8px; }
    .acc-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
    .acc-sub { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .acc-right { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .acc-body { padding: 14px 16px 16px; display: grid; gap: 14px; }
    .metric-grid { display: grid; gap: 10px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .metric {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
    }
    .metric .k { color: var(--muted); font-size: 12px; }
    .metric .v { margin-top: 5px; font-weight: 700; font-size: 15px; }
    .split-2 { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.02);
    }
    table { width: 100%; min-width: 680px; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
    th { color: #dbe6ff; background: rgba(255,255,255,.04); }
    tr:hover td { background: rgba(255,255,255,.03); }
    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line-2);
      border-radius: 16px;
    }
    .group-acc { border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.02); overflow: hidden; }
    .group-acc > summary { list-style: none; cursor: pointer; padding: 14px 16px; font-weight: 700; }
    .group-acc > summary::-webkit-details-marker { display: none; }
    .group-acc[open] > summary { border-bottom: 1px solid var(--line); background: rgba(255,255,255,.025); }
    .group-body { padding: 14px 16px 16px; }
    .score-block {
      display: grid;
      gap: 14px;
      grid-template-columns: 150px 1fr;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }
    .score-ring {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(rgba(110,168,254,.95) calc(var(--pct) * 1%), rgba(255,255,255,.08) 0);
      margin: 0 auto;
      position: relative;
    }
    .score-ring::after {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background: linear-gradient(180deg, #0f1931, #111d38);
      border: 1px solid var(--line);
    }
    .score-center { position: relative; z-index: 1; text-align: center; }
    .score-big { font-size: 34px; font-weight: 800; }
    .score-grade { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .bar-list { display: grid; gap: 10px; }
    .bar-row {
      display: grid;
      gap: 10px;
      grid-template-columns: 120px 1fr 48px;
      align-items: center;
      font-size: 13px;
    }
    .bar-rail { height: 10px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, rgba(110,168,254,.92), rgba(143,211,255,.92)); }
    .checkbox-grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .check-item {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.025);
    }
    .check-item input { margin-top: 3px; }
    .check-title { font-size: 14px; font-weight: 700; }
    .check-sub { color: var(--muted); font-size: 12px; line-height: 1.55; margin-top: 4px; }
    .footer-tip {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(251,191,36,.22);
      background: rgba(251,191,36,.08);
      color: #fde68a;
      font-size: 13px;
      line-height: 1.7;
    }
    @media (max-width: 1024px) {
      .stats-grid, .metric-grid, .split-2, .checkbox-grid { grid-template-columns: 1fr 1fr; }
      .score-block { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .app { padding: 12px; }
      .hero { padding: 18px; }
      .hero h1 { font-size: 24px; }
      .stats-grid, .metric-grid, .split-2, .checkbox-grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
      details.acc > summary { align-items: start; flex-direction: column; }
      .acc-right { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>双色球个人分析台</h1>
      <p>单文件 HTML 版。数据、统计逻辑、交互脚本全部内嵌，可直接本地打开。当前版本按“个人使用”重构：保留历史档案与形态分析，同时加入号码评分与本期推荐。</p>
      <div class="hero-note">当前推荐逻辑采用 <strong>历史形态常见度 + 结构均衡度 + 排除项过滤</strong>。本版额外加入<strong>评分带</strong>视角：综合评分不是越高越好，很多历史真实开奖号会落在中段，所以<strong>分数所在区间本身也是一个结构维度</strong>，可以和和值、跨度、AC 一样单独观察。</div>
      <div class="tabbar" id="topTabs"></div>
    </section>

    <section class="stats-grid" id="statsGrid"></section>

    <main class="main" id="tabContent"></main>

    <div class="footer-tip">说明：这个版本面向你个人验证与使用，推荐区和评分区已直接纳入主流程，不再按“未来上线可删模块”处理。</div>
  </div>

  <script id="app-code" type="text/plain">
const summary = DATA.summary;
    const draws = DATA.drawsDesc;
    const shapeStats = DATA.shapeStats;
    const museum = DATA.museum;
    const typeMeta = DATA.typeMeta;

    const tabs = [
      { id: 'dashboard', label: '总览' },
      { id: 'history', label: '历史开奖' },
      { id: 'analyze', label: '号码评分' },
      { id: 'recommend', label: '本期推荐' },
      { id: 'archive', label: '形态档案' },
      { id: 'museum', label: '形态博物馆' },
    ];

    const state = {
      tab: 'dashboard',
      history: { mode: 'latest', limit: 1, issue: '', date: '' },
      analyze: { lastProfile: null, sort: 'rate_desc' },
      archive: { kind: 'all', type: '', keyword: '', sort: 'rate_desc', limit: 40 },
      recommend: {
        sort: 'score_desc',
        lastList: [],
        options: {
          excludeAllOddEven: true,
          excludeSameTail: true,
          excludeFullRun: true,
          excludeRareRun: true,
          excludeZoneBreak: true,
          excludeLowSum: false,
          excludeHighSum: false,
          excludeLowAC: false,
          excludeHighAC: false,
          excludeRedBlueSame: false,
          excludeHistoricalDuplicate: true,
          avoidLatestOverlap: true,
          preferBalanced: false,
        }
      }
    };

    const shapeMap = Object.fromEntries(shapeStats.map(s => [s.id, s]));
    const statsByType = Object.fromEntries(Object.keys(typeMeta).map(type => [type, shapeStats.filter(s => s.type === type)]));
    const drawsAsc = [...draws].reverse();
    const latestDraw = draws[0];
    const redFreq = Array(34).fill(0);
    const blueFreq = Array(17).fill(0);
    draws.forEach(d => {
      d.reds.forEach(n => redFreq[n]++);
      blueFreq[d.blue]++;
    });
    const metricSeries = {
      sum: draws.map(d => d.metrics.sum).sort((a,b)=>a-b),
      span: draws.map(d => d.metrics.span).sort((a,b)=>a-b),
      ac: draws.map(d => d.metrics.ac).sort((a,b)=>a-b),
    };
    const typeFreqPercentile = {};
    Object.entries(statsByType).forEach(([type, arr]) => {
      const sorted = [...arr].sort((a,b) => a.occurrence_count - b.occurrence_count || a.display.localeCompare(b.display, 'zh-CN'));
      const denom = Math.max(1, sorted.length - 1);
      sorted.forEach((s, idx) => { typeFreqPercentile[s.id] = sorted.length <= 1 ? 1 : idx / denom; });
    });


    const neutralRecommendOptions = {
      excludeAllOddEven: false,
      excludeSameTail: false,
      excludeFullRun: false,
      excludeRareRun: false,
      excludeZoneBreak: false,
      excludeLowSum: false,
      excludeHighSum: false,
      excludeLowAC: false,
      excludeHighAC: false,
      excludeRedBlueSame: false,
      excludeHistoricalDuplicate: false,
      avoidLatestOverlap: false,
      preferBalanced: false,
    };

    function getGrade(score) {
      return score >= 85 ? 'S' : score >= 76 ? 'A' : score >= 67 ? 'B' : score >= 58 ? 'C' : 'D';
    }

    const scoreBandConfig = {
      score: [
        { min: 1, max: 44, label: '异型低分带', tone: 'red', desc: '与当前模型偏好的常见结构和均衡结构距离较远，通常带有更明显的偏态、极端值或稀有组合。' },
        { min: 45, max: 57, label: '偏离带', tone: 'yellow', desc: '仍偏离当前模型中心，但没有低分带那么极端，常见于一到两个维度明显外扩。' },
        { min: 58, max: 68, label: '常规中低带', tone: 'blue', desc: '这是正常历史开奖会大量落入的区间之一，不是差分，只是整体更接近中性偏低。' },
        { min: 69, max: 79, label: '常规中枢带', tone: 'green', desc: '当前模型下的中心区间，常见度与均衡度都比较稳。' },
        { min: 80, max: 89, label: '高契合带', tone: 'green', desc: '与当前模型偏好的常见+均衡结构更接近，但不代表更容易开出。' },
        { min: 90, max: 99, label: '拥挤高分带', tone: 'yellow', desc: '非常贴近当前模型中心，说明结构上很“顺眼”，但高分本身不应被理解成绝对更好。' },
      ],
      prevalence: [
        { min: 1, max: 24, label: '稀有带', tone: 'red', desc: '命中的常规形态在历史上相对少见，组合更偏冷。' },
        { min: 25, max: 44, label: '偏稀带', tone: 'yellow', desc: '仍偏冷，但没有进入最稀有的一端。' },
        { min: 45, max: 59, label: '常规中低带', tone: 'blue', desc: '历史上并不罕见，也谈不上高频，属于中间偏下。' },
        { min: 60, max: 74, label: '常规中高带', tone: 'blue', desc: '偏向常见，但还没有到拥挤区。' },
        { min: 75, max: 89, label: '高频带', tone: 'green', desc: '命中的常规形态在历史里比较常见。' },
        { min: 90, max: 99, label: '热点拥挤带', tone: 'yellow', desc: '非常贴近历史高频结构，但“高频”不等于“更该选”。' },
      ],
      balance: [
        { min: 1, max: 39, label: '失衡带', tone: 'red', desc: '大小、奇偶、三区或和值/跨度/AC 等多个维度出现明显失衡。' },
        { min: 40, max: 54, label: '偏失衡带', tone: 'yellow', desc: '结构仍偏斜，只是没有到最极端。' },
        { min: 55, max: 69, label: '可接受带', tone: 'blue', desc: '整体可接受，但并不是很典型的中性结构。' },
        { min: 70, max: 84, label: '均衡带', tone: 'green', desc: '多个核心维度处于比较协调的位置。' },
        { min: 85, max: 99, label: '强均衡带', tone: 'green', desc: '结构非常整齐，但这仍然只是“均衡”，不是“必优”。' },
      ],
    };
    const scoreAxisLabel = {
      score: '综合评分',
      prevalence: '历史常见度',
      balance: '结构均衡度',
    };
    function getScoreBand(axis, value) {
      const defs = scoreBandConfig[axis] || [];
      return defs.find(def => value >= def.min && value <= def.max) || defs[defs.length - 1] || { min: 0, max: 99, label: '未定义', tone: 'blue', desc: '' };
    }
    function bandRangeText(band) {
      return `${band.min}-${band.max}`;
    }

    function buildHistoricalScoreProfiles() {
      const perTypeCounts = Object.fromEntries(Object.keys(typeMeta).map(type => [type, {}]));
      const redCounts = Array(34).fill(0);
      const blueCounts = Array(17).fill(0);
      const sumVals = [];
      const spanVals = [];
      const acVals = [];
      const profileMap = {};

      for (const draw of drawsAsc) {
        draw.reds.forEach(n => { redCounts[n] += 1; });
        blueCounts[draw.blue] += 1;
        sumVals.push(draw.metrics.sum);
        spanVals.push(draw.metrics.span);
        acVals.push(draw.metrics.ac);
        draw.shape_refs.forEach(ref => {
          const id = `${ref.type}::${ref.key}`;
          perTypeCounts[ref.type][id] = (perTypeCounts[ref.type][id] || 0) + 1;
        });

        const percentileByType = {};
        Object.entries(statsByType).forEach(([type, arr]) => {
          const sorted = [...arr].sort((a, b) => {
            const ca = perTypeCounts[type][a.id] || 0;
            const cb = perTypeCounts[type][b.id] || 0;
            return ca - cb || a.display.localeCompare(b.display, 'zh-CN');
          });
          const denom = Math.max(1, sorted.length - 1);
          const map = {};
          sorted.forEach((item, idx) => {
            map[item.id] = sorted.length <= 1 ? 1 : idx / denom;
          });
          percentileByType[type] = map;
        });

        const sumSorted = [...sumVals].sort((a, b) => a - b);
        const spanSorted = [...spanVals].sort((a, b) => a - b);
        const acSorted = [...acVals].sort((a, b) => a - b);
        const p10Sum = percentile(sumSorted, .1), p50Sum = percentile(sumSorted, .5), p90Sum = percentile(sumSorted, .9);
        const p10Span = percentile(spanSorted, .1), p50Span = percentile(spanSorted, .5), p90Span = percentile(spanSorted, .9);
        const p10Ac = percentile(acSorted, .1), p50Ac = percentile(acSorted, .5), p90Ac = percentile(acSorted, .9);

        const base = inputShapes(draw.reds, draw.blue);
        const prevalenceBase = base.refs
          .filter(ref => ref.type !== 'special_shape')
          .map(ref => percentileByType[ref.type]?.[ref.id] ?? 0.5);
        const prevalence = Math.round(avg(prevalenceBase) * 100);

        const sizeScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.small] || 20;
        const oddEvenScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.odd] || 20;
        const zoneDiff = Math.abs(base.metrics.z1 - 2) + Math.abs(base.metrics.z2 - 2) + Math.abs(base.metrics.z3 - 2);
        const zoneScore = clamp(100 - zoneDiff * 22, 24, 100);
        const sumScore = valueScoreByDistance(base.metrics.sum, p10Sum, p50Sum, p90Sum);
        const spanScore = valueScoreByDistance(base.metrics.span, p10Span, p50Span, p90Span);
        const acScore = valueScoreByDistance(base.metrics.ac, p10Ac, p50Ac, p90Ac);
        const tailScore = base.metrics.tailPattern === '全不同尾' ? 96 : (base.metrics.tailPattern === '全同尾' ? 8 : 72);
        let runScore = 90;
        if (base.metrics.runLabel === '1组2连') runScore = 80;
        else if (base.metrics.runLabel === '2连+2连') runScore = 72;
        else if (base.metrics.runLabel === '1组3连') runScore = 58;
        else if (['1组4连', '1组5连', '全6连号', '3连+2连', '4连+2连'].includes(base.metrics.runLabel)) runScore = 16;
        const maxRedCount = Math.max(1, ...redCounts.slice(1));
        const maxBlueCount = Math.max(1, ...blueCounts.slice(1));
        const numberFreqScore = clamp(Math.round(avg(draw.reds.map(n => redCounts[n] / maxRedCount)) * 100), 20, 100);
        const blueFreqScore = clamp(Math.round((blueCounts[draw.blue] / maxBlueCount) * 100), 20, 100);
        const balance = Math.round(sizeScore*.16 + oddEvenScore*.16 + zoneScore*.2 + sumScore*.14 + spanScore*.09 + acScore*.09 + tailScore*.06 + runScore*.05 + numberFreqScore*.03 + blueFreqScore*.02);
        const score = clamp(Math.round(prevalence*.52 + balance*.40 + 8), 1, 99);

        profileMap[draw.issue] = {
          score,
          prevalence,
          balance,
          grade: getGrade(score),
          asOfDrawCount: sumVals.length,
          asOfIssue: draw.issue,
          asOfDate: draw.date,
        };
      }
      return profileMap;
    }

    const historicalScoreProfiles = buildHistoricalScoreProfiles();

    function buildScoreBandArchives() {
      const archives = { score: [], prevalence: [], balance: [] };
      Object.keys(archives).forEach(axis => {
        const defs = (scoreBandConfig[axis] || []).map(def => ({ ...def, count: 0, rate: 0, recent_records: [] }));
        draws.forEach(draw => {
          const hist = historicalScoreProfiles[draw.issue];
          if (!hist) return;
          const value = hist[axis];
          const hit = defs.find(def => value >= def.min && value <= def.max);
          if (!hit) return;
          hit.count += 1;
          hit.recent_records.push({
            issue: draw.issue,
            date: draw.date,
            reds: draw.reds,
            blue: draw.blue,
            sum: draw.metrics.sum,
            span: draw.metrics.span,
            ac: draw.metrics.ac,
            value,
          });
        });
        defs.forEach(def => {
          def.rate = summary.totalDraws ? def.count / summary.totalDraws : 0;
          def.recent_records = def.recent_records.slice(0, 8);
        });
        archives[axis] = defs;
      });
      return archives;
    }
    const scoreBandArchives = buildScoreBandArchives();
    function getBandArchive(axis, value) {
      const band = getScoreBand(axis, value);
      return scoreBandArchives[axis].find(item => item.min === band.min && item.max === band.max) || { ...band, count: 0, rate: 0, recent_records: [] };
    }
    function bandBadge(axis, value) {
      const band = getScoreBand(axis, value);
      return labelPill(`${scoreAxisLabel[axis]}带 ${bandRangeText(band)} ${band.label}`, band.tone);
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
    function ball(n) { return String(n).padStart(2, '0'); }
    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function fmtPct(v) { return v === null || v === undefined ? '—' : (v * 100).toFixed(2) + '%'; }
    function fmtScore(v) {
      if (v === null || v === undefined || Number.isNaN(v)) return '—';
      const n = Number(v);
      return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/, '');
    }
    function percentile(sortedVals, p) {
      if (!sortedVals.length) return 0;
      if (sortedVals.length === 1) return sortedVals[0];
      const k = (sortedVals.length - 1) * p;
      const f = Math.floor(k);
      const c = Math.ceil(k);
      if (f === c) return sortedVals[f];
      const d = k - f;
      return sortedVals[f] * (1 - d) + sortedVals[c] * d;
    }
    function valueScoreByDistance(value, p10, p50, p90) {
      const leftSpan = Math.max(1, p50 - p10);
      const rightSpan = Math.max(1, p90 - p50);
      if (value <= p50) return clamp(Math.round(100 - Math.abs(value - p50) / leftSpan * 38), 20, 100);
      return clamp(Math.round(100 - Math.abs(value - p50) / rightSpan * 38), 20, 100);
    }
    function renderBalls(reds, blue) {
      return `<div class="balls">${reds.map(n => `<span class="ball red">${ball(n)}</span>`).join('')}${blue !== null && blue !== undefined ? `<span class="ball blue">${ball(blue)}</span>` : ''}</div>`;
    }
    function labelPill(text, cls='') { return `<span class="pill ${cls}">${escapeHtml(text)}</span>`; }
    function countOverlap(a, b) { const setB = new Set(b); return a.filter(x => setB.has(x)).length; }

    function buildTopTabs() {
      document.getElementById('topTabs').innerHTML = tabs.map(t => `<button class="tab-btn ${state.tab === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');
    }
    function switchTab(id) {
      state.tab = id;
      renderTabContent();
      buildTopTabs();
    }

    function renderSummaryCards() {
      const cards = [
        { label: '历史总期数', value: summary.totalDraws, sub: `${summary.dateStart} 至 ${summary.dateEnd}` },
        { label: '最新期开奖', value: summary.latestIssue, sub: `${summary.latestDate} / 蓝球 ${ball(summary.latestBlue)}` },
        { label: '形态条目', value: summary.shapeStatCount, sub: `特殊档案 ${summary.specialStatCount} 条` },
        { label: '最新一期结构', value: `和值 ${summary.latestSum}`, sub: `跨度 ${summary.latestSpan} / AC ${summary.latestAC}` },
      ];
      document.getElementById('statsGrid').innerHTML = cards.map(c => `
        <div class="stat-card">
          <div class="label">${c.label}</div>
          <div class="value">${c.value}</div>
          <div class="sub">${c.sub}</div>
        </div>
      `).join('');
    }

    function getRuns(reds) {
      const rs = [];
      let cur = 1;
      for (let i = 1; i < reds.length; i++) {
        if (reds[i] === reds[i - 1] + 1) cur += 1;
        else {
          if (cur >= 2) rs.push(cur);
          cur = 1;
        }
      }
      if (cur >= 2) rs.push(cur);
      return rs;
    }
    function getConsecutiveLabel(reds) {
      const rs = getRuns(reds).sort((a, b) => b - a);
      if (!rs.length) return '无连号';
      if (rs.length === 1 && rs[0] === 6) return '全6连号';
      if (rs.length === 1) return `1组${rs[0]}连`;
      return rs.map(r => `${r}连`).join('+');
    }
    function getAC(reds) {
      const diffs = new Set();
      for (let i = 0; i < reds.length; i++) {
        for (let j = 0; j < i; j++) diffs.add(reds[i] - reds[j]);
      }
      return diffs.size - (reds.length - 1);
    }
    function getTailPattern(reds) {
      const map = new Map();
      reds.forEach(n => map.set(n % 10, (map.get(n % 10) || 0) + 1));
      const groups = [...map.values()].filter(v => v >= 2).sort((a,b)=>b-a);
      if (!groups.length) return '全不同尾';
      if (groups.length === 1 && groups[0] === 6) return '全同尾';
      return groups.map(g => `1组${g}同尾`).join('+');
    }
    function getSumBucket(sum) { const lo = Math.max(Math.floor(sum / 10) * 10, 20); return `${lo}-${Math.min(lo + 9, 189)}`; }
    function getSpanBucket(span) { const lo = Math.floor(span / 5) * 5; return `${lo}-${lo + 4}`; }
    function parseRedInput(text) { return ((text || '').match(/\d+/g) || []).map(Number); }
    function parseBlueInput(text) {
      const vals = ((text || '').match(/\d+/g) || []).map(Number);
      return vals.length ? vals[0] : null;
    }
    function validateNumbers(reds, blue) {
      if (reds.length !== 6) return '红球必须正好输入 6 个。';
      if (reds.some(n => !Number.isInteger(n) || n < 1 || n > 33)) return '红球必须在 1-33 之间。';
      if (new Set(reds).size !== 6) return '红球不能重复。';
      if (blue !== null && (!Number.isInteger(blue) || blue < 1 || blue > 16)) return '蓝球必须在 1-16 之间。';
      return '';
    }

    function synthStat(ref) {
      const meta = typeMeta[ref.type] || { group: '未分类', label: ref.type, description: '' };
      return {
        id: ref.id,
        type: ref.type,
        key: ref.key,
        display: ref.display,
        group: meta.group,
        type_label: meta.label,
        kind: meta.defaultKind === 'special' ? 'special' : 'regular',
        type_description: meta.description || '',
        occurrence_count: 0,
        occurrence_rate: 0,
        last_seen_issue: null,
        last_seen_date: null,
        first_seen_issue: null,
        first_seen_date: null,
        current_gap: summary.totalDraws,
        avg_gap: null,
        median_gap: null,
        p80_gap: null,
        p90_gap: null,
        max_gap: null,
        rarity_label: '历史未出现',
        gap_position_label: '历史未出现',
        recent_records: []
      };
    }

    function inputShapes(reds, blue) {
      reds = [...reds].sort((a,b)=>a-b);
      const refs = [];
      const add = (type, key, display) => refs.push({ id: `${type}::${key}`, type, key: String(key), display });
      const small = reds.filter(n => n <= 16).length;
      const big = 6 - small;
      const odd = reds.filter(n => n % 2 === 1).length;
      const even = 6 - odd;
      const z1 = reds.filter(n => n >= 1 && n <= 11).length;
      const z2 = reds.filter(n => n >= 12 && n <= 22).length;
      const z3 = 6 - z1 - z2;
      const m0 = reds.filter(n => n % 3 === 0).length;
      const m1 = reds.filter(n => n % 3 === 1).length;
      const m2 = 6 - m0 - m1;
      const breakParts = [];
      if (z1 === 0) breakParts.push('断1区');
      if (z2 === 0) breakParts.push('断2区');
      if (z3 === 0) breakParts.push('断3区');
      const runLabel = getConsecutiveLabel(reds);
      const tailPattern = getTailPattern(reds);
      const ac = getAC(reds);
      const sum = reds.reduce((a,b)=>a+b, 0);
      const span = reds[5] - reds[0];
      const latestOverlap = countOverlap(reds, latestDraw.reds);
      const latestNeighborSet = new Set();
      latestDraw.reds.forEach(x => { if (x > 1) latestNeighborSet.add(x - 1); if (x < 33) latestNeighborSet.add(x + 1); });
      const latestNeighbors = reds.filter(x => !latestDraw.reds.includes(x) && latestNeighborSet.has(x)).length;
      const exact = draws.find(d => d.blue === blue && d.reds.every((n, i) => n === reds[i])) || null;

      add('size_ratio', `${small}:${big}`, `大小比 ${small}:${big}`);
      add('odd_even_ratio', `${odd}:${even}`, `奇偶比 ${odd}:${even}`);
      add('zone_distribution', `${z1}-${z2}-${z3}`, `三区比 ${z1}-${z2}-${z3}`);
      add('zone_break', breakParts.length ? breakParts.join('+') : '不断区', `断区 ${breakParts.length ? breakParts.join('+') : '不断区'}`);
      add('mod012_distribution', `${m0}-${m1}-${m2}`, `012路比 ${m0}-${m1}-${m2}`);
      add('tail_pattern', tailPattern, `尾数组型 ${tailPattern}`);
      add('consecutive_structure', runLabel, `连号结构 ${runLabel}`);
      add('sum_bucket', getSumBucket(sum), `和值区间 ${getSumBucket(sum)}`);
      add('span_bucket', getSpanBucket(span), `跨度区间 ${getSpanBucket(span)}`);
      add('ac_value', String(ac), `AC值 ${ac}`);
      if (blue !== null) {
        const blueSize = blue <= 8 ? '小' : '大';
        const blueOE = blue % 2 ? '奇' : '偶';
        add('blue_size', blueSize, `蓝球大小 ${blueSize}`);
        add('blue_odd_even', blueOE, `蓝球奇偶 ${blueOE}`);
        add('blue_mod012', `${blue % 3}路`, `蓝球012路 ${blue % 3}路`);
        add('red_blue_same', reds.includes(blue) ? '红蓝同号' : '红蓝不同号', reds.includes(blue) ? '红蓝同号' : '红蓝不同号');
        const rbMin = Math.min(...reds.map(n => Math.abs(n - blue)));
        const rbMinBucket = rbMin === 0 ? '0' : (rbMin === 1 ? '1' : (rbMin === 2 ? '2' : '3+'));
        add('red_blue_min_gap', rbMinBucket, `红蓝最小差 ${rbMinBucket}`);
        add('rb_parity_combo', `蓝${blueOE} + 红奇偶比 ${odd}:${even}`, `红蓝奇偶联动 蓝${blueOE} / 红${odd}:${even}`);
        add('rb_size_combo', `蓝${blueSize} + 红大小比 ${small}:${big}`, `红蓝大小联动 蓝${blueSize} / 红${small}:${big}`);
        add('rb_mod012_combo', `蓝${blue % 3}路 + 红012比 ${m0}-${m1}-${m2}`, `红蓝012联动 蓝${blue % 3}路 / 红${m0}-${m1}-${m2}`);
      }

      const specials = [];
      if (odd === 6) specials.push('全奇');
      if (even === 6) specials.push('全偶');
      if (tailPattern === '全同尾') specials.push('全同尾');
      if (runLabel === '全6连号') specials.push('全6连号');
      if (breakParts.length) specials.push('断区形态');
      if (sum <= 60) specials.push('极低和值');
      if (sum >= 140) specials.push('极高和值');
      if (ac <= 2) specials.push('极低AC值');
      if (ac >= 9) specials.push('极高AC值');
      if (['1组5连', '1组4连', '3连+2连', '4连+2连'].includes(runLabel)) specials.push('罕见连号结构');
      specials.forEach(sp => add('special_shape', sp, sp));

      const numberHeat = Math.round(avg(reds.map(n => redFreq[n] / summary.totalDraws * 1000)) / 10 * 10) / 10;
      const blueHeat = blue !== null ? Math.round((blueFreq[blue] / summary.totalDraws * 100).toFixed(2) * 100) / 100 : null;

      return {
        refs,
        metrics: {
          sum, span, ac, small, big, odd, even, z1, z2, z3, m0, m1, m2,
          runLabel, tailPattern, breakParts, latestOverlap, latestNeighbors,
          exactIssue: exact ? exact.issue : null,
          numberHeat,
          blueHeat,
        }
      };
    }

    function candidateProfile(reds, blue, opts = state.recommend.options) {
      const base = inputShapes(reds, blue);
      const matchedStats = base.refs.map(ref => shapeMap[ref.id] ? { ...shapeMap[ref.id], display: ref.display } : synthStat(ref));
      const prevalenceBase = matchedStats
        .filter(s => s.type !== 'special_shape')
        .map(s => typeFreqPercentile[s.id] !== undefined ? typeFreqPercentile[s.id] : 0.5);
      const prevalence = Math.round(avg(prevalenceBase) * 100);

      const p10Sum = percentile(metricSeries.sum, .1), p50Sum = percentile(metricSeries.sum, .5), p90Sum = percentile(metricSeries.sum, .9);
      const p10Span = percentile(metricSeries.span, .1), p50Span = percentile(metricSeries.span, .5), p90Span = percentile(metricSeries.span, .9);
      const p10Ac = percentile(metricSeries.ac, .1), p50Ac = percentile(metricSeries.ac, .5), p90Ac = percentile(metricSeries.ac, .9);
      const sizeScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.small] || 20;
      const oddEvenScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.odd] || 20;
      const zoneDiff = Math.abs(base.metrics.z1 - 2) + Math.abs(base.metrics.z2 - 2) + Math.abs(base.metrics.z3 - 2);
      const zoneScore = clamp(100 - zoneDiff * 22, 24, 100);
      const sumScore = valueScoreByDistance(base.metrics.sum, p10Sum, p50Sum, p90Sum);
      const spanScore = valueScoreByDistance(base.metrics.span, p10Span, p50Span, p90Span);
      const acScore = valueScoreByDistance(base.metrics.ac, p10Ac, p50Ac, p90Ac);
      const tailScore = base.metrics.tailPattern === '全不同尾' ? 96 : (base.metrics.tailPattern === '全同尾' ? 8 : 72);
      let runScore = 90;
      if (base.metrics.runLabel === '1组2连') runScore = 80;
      else if (base.metrics.runLabel === '2连+2连') runScore = 72;
      else if (base.metrics.runLabel === '1组3连') runScore = 58;
      else if (['1组4连', '1组5连', '全6连号', '3连+2连', '4连+2连'].includes(base.metrics.runLabel)) runScore = 16;
      const numberFreqScore = clamp(Math.round(avg(reds.map(n => redFreq[n] / Math.max(...redFreq))) * 100), 20, 100);
      const blueFreqScore = blue !== null ? clamp(Math.round((blueFreq[blue] / Math.max(...blueFreq)) * 100), 20, 100) : 50;
      const balance = Math.round(sizeScore*.16 + oddEvenScore*.16 + zoneScore*.2 + sumScore*.14 + spanScore*.09 + acScore*.09 + tailScore*.06 + runScore*.05 + numberFreqScore*.03 + blueFreqScore*.02);

      const ruleHits = [];
      let penalty = 0;
      const specials = base.refs.filter(r => r.type === 'special_shape').map(r => r.key);
      if (opts.excludeAllOddEven && (base.metrics.odd === 6 || base.metrics.even === 6)) { ruleHits.push('全奇/全偶'); penalty += 16; }
      if (opts.excludeSameTail && base.metrics.tailPattern === '全同尾') { ruleHits.push('全同尾'); penalty += 18; }
      if (opts.excludeFullRun && base.metrics.runLabel === '全6连号') { ruleHits.push('全6连号'); penalty += 20; }
      if (opts.excludeRareRun && ['1组5连','1组4连','3连+2连','4连+2连'].includes(base.metrics.runLabel)) { ruleHits.push('罕见长连号'); penalty += 16; }
      if (opts.excludeZoneBreak && base.metrics.breakParts.length) { ruleHits.push('断区形态'); penalty += 14; }
      if (opts.excludeLowSum && base.metrics.sum <= 60) { ruleHits.push('极低和值'); penalty += 12; }
      if (opts.excludeHighSum && base.metrics.sum >= 140) { ruleHits.push('极高和值'); penalty += 12; }
      if (opts.excludeLowAC && base.metrics.ac <= 2) { ruleHits.push('极低AC'); penalty += 12; }
      if (opts.excludeHighAC && base.metrics.ac >= 9) { ruleHits.push('极高AC'); penalty += 10; }
      if (opts.excludeRedBlueSame && blue !== null && reds.includes(blue)) { ruleHits.push('红蓝同号'); penalty += 9; }
      if (opts.excludeHistoricalDuplicate && base.metrics.exactIssue) { ruleHits.push('历史完全重复'); penalty += 22; }
      if (opts.avoidLatestOverlap && base.metrics.latestOverlap >= 4) { ruleHits.push('与最新一期高重合'); penalty += 10; }
      if (opts.preferBalanced && balance < 62) { ruleHits.push('均衡度不足'); penalty += 8; }

      const specialStats = matchedStats.filter(s => s.type === 'special_shape' || s.kind === 'special').sort((a,b)=>a.occurrence_count - b.occurrence_count);
      const penaltyScore = clamp(100 - penalty, 0, 100);
      const score = clamp(Math.round(prevalence*.52 + balance*.40 + penaltyScore*.08 - ruleHits.length*2), 1, 99);
      const grade = getGrade(score);
      const reasons = [];
      if (prevalence >= 75) reasons.push('历史形态偏常见');
      if (balance >= 78) reasons.push('结构均衡度较高');
      if (base.metrics.latestOverlap <= 2) reasons.push('与最新一期重合较低');
      if (!specials.length) reasons.push('未触发特殊形态');
      if (base.metrics.z1 === 2 && base.metrics.z2 === 2 && base.metrics.z3 === 2) reasons.push('三区分布均衡');
      if (base.metrics.odd === 3 && base.metrics.small === 3) reasons.push('奇偶/大小接近中性');
      if (!reasons.length) reasons.push('通过当前评分逻辑');

      return {
        reds: [...reds].sort((a,b)=>a-b),
        blue,
        base,
        matchedStats,
        prevalence,
        balance,
        penaltyScore,
        score,
        grade,
        ruleHits,
        specialStats,
        reasons,
        key: [...reds].sort((a,b)=>a-b).join('-') + '|' + blue,
      };
    }

    function randomCandidate() {
      const pool = Array.from({ length: 33 }, (_, i) => i + 1);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      const reds = pool.slice(0, 6).sort((a,b)=>a-b);
      const blue = 1 + Math.floor(Math.random() * 16);
      return { reds, blue };
    }

    function sortStats(list, key) {
      const arr = [...list];
      if (key === 'rate_desc') arr.sort((a,b)=>b.occurrence_rate - a.occurrence_rate || b.occurrence_count - a.occurrence_count || a.display.localeCompare(b.display,'zh-CN'));
      else if (key === 'rate_asc') arr.sort((a,b)=>a.occurrence_rate - b.occurrence_rate || a.occurrence_count - b.occurrence_count || a.display.localeCompare(b.display,'zh-CN'));
      else if (key === 'gap_desc') arr.sort((a,b)=>b.current_gap - a.current_gap || a.display.localeCompare(b.display,'zh-CN'));
      else if (key === 'name') arr.sort((a,b)=>a.display.localeCompare(b.display,'zh-CN'));
      return arr;
    }

    function sortRecommendList(list, key) {
      const arr = [...list];
      if (key === 'score_desc') arr.sort((a,b)=>b.score - a.score || b.balance - a.balance || a.key.localeCompare(b.key,'zh-CN'));
      else if (key === 'prevalence_desc') arr.sort((a,b)=>b.prevalence - a.prevalence || b.score - a.score);
      else if (key === 'balance_desc') arr.sort((a,b)=>b.balance - a.balance || b.score - a.score);
      else if (key === 'rare_first') arr.sort((a,b)=>a.prevalence - b.prevalence || b.score - a.score);
      return arr;
    }

    function renderHistoricalScoreBlock(hist) {

      const scoreBand = getBandArchive('score', hist.score);

      const balanceBand = getBandArchive('balance', hist.balance);
      return `
        <div>

            <div class="metric"><div class="k">历史常见度</div><div class="v">${hist.prevalence}</div></div>

    function readRecommendOptions() {
      const get = id => !!document.getElementById(id)?.checked;
      return {

        excludeFullRun: get('optExcludeFullRun'),
        excludeRareRun: get('optExcludeRareRun'),
        excludeZoneBreak: get('optExcludeZoneBreak'),
        excludeLowSum: get('optExcludeLowSum'),
        excludeHighSum: get('optExcludeHighSum'),
        excludeLowAC: get('optExcludeLowAC'),
        excludeHighAC: get('optExcludeHighAC'),
        excludeRedBlueSame: get('optExcludeRedBlueSame'),
        excludeHistoricalDuplicate: get('optExcludeHistoricalDuplicate'),
        avoidLatestOverlap: get('optAvoidLatestOverlap'),
        preferBalanced: get('optPreferBalanced'),
      };
    }

    function generateRecommendations() {
      state.recommend.options = readRecommendOptions();
      const opts = state.recommend.options;
      const pool = [];
      const seen = new Set();
      const attempts = opts.preferBalanced ? 9000 : 6500;
      for (let i = 0; i < attempts; i++) {
        const cand = randomCandidate();
        const profile = candidateProfile(cand.reds, cand.blue, opts);
        if (profile.ruleHits.length) continue;
        if (seen.has(profile.key)) continue;
        seen.add(profile.key);
        pool.push(profile);
      }
      pool.sort((a,b)=>b.score - a.score || b.balance - a.balance || a.key.localeCompare(b.key, 'zh-CN'));
      const selected = [];
      for (const item of pool) {
        if (selected.length >= 5) break;
        if (selected.every(s => countOverlap(s.reds, item.reds) <= 3)) selected.push(item);
      }
      for (const item of pool) {
        if (selected.length >= 5) break;
        if (!selected.find(s => s.key === item.key)) selected.push(item);
      }
      state.recommend.lastList = sortRecommendList(selected, state.recommend.sort);
      renderTabContent();
    }

(function(){
  const AXES = ['score','prevalence','balance'];
  const AXIS_LABEL = { score: '综合评分', prevalence: '历史常见度', balance: '结构均衡度' };
  const BAND_WIDTH = { score: 4, prevalence: 4, balance: 4 };

  function getTypePercentileMapByCounts(perTypeCounts, historyCount) {
    const percentileByType = {};
    Object.entries(statsByType).forEach(([type, arr]) => {
      if (!arr.length) {
        percentileByType[type] = {};
        return;
      }
      if (historyCount === 0) {
        const map = {};
        arr.forEach(item => { map[item.id] = typeFreqPercentile[item.id] ?? 0.5; });
        percentileByType[type] = map;
        return;
      }
      const sorted = [...arr].sort((a, b) => {
        const ca = perTypeCounts[type][a.id] || 0;
        const cb = perTypeCounts[type][b.id] || 0;
        return ca - cb || a.display.localeCompare(b.display, 'zh-CN');
      });
      const denom = Math.max(1, sorted.length - 1);
      const map = {};
      sorted.forEach((item, idx) => {
        map[item.id] = sorted.length <= 1 ? 1 : idx / denom;
      });
      percentileByType[type] = map;
    });
    return percentileByType;
  }

  function computeBalanceAndPrevalence(base, reds, blue, ctx) {
    const prevalenceBase = base.refs
      .filter(ref => ref.type !== 'special_shape')
      .map(ref => ctx.percentileByType[ref.type]?.[ref.id] ?? typeFreqPercentile[ref.id] ?? 0.5);
    const prevalence = Math.round(avg(prevalenceBase) * 100);

    const p10Sum = percentile(ctx.sumSeries.length ? ctx.sumSeries : metricSeries.sum, .1);
    const p50Sum = percentile(ctx.sumSeries.length ? ctx.sumSeries : metricSeries.sum, .5);
    const p90Sum = percentile(ctx.sumSeries.length ? ctx.sumSeries : metricSeries.sum, .9);
    const p10Span = percentile(ctx.spanSeries.length ? ctx.spanSeries : metricSeries.span, .1);
    const p50Span = percentile(ctx.spanSeries.length ? ctx.spanSeries : metricSeries.span, .5);
    const p90Span = percentile(ctx.spanSeries.length ? ctx.spanSeries : metricSeries.span, .9);
    const p10Ac = percentile(ctx.acSeries.length ? ctx.acSeries : metricSeries.ac, .1);
    const p50Ac = percentile(ctx.acSeries.length ? ctx.acSeries : metricSeries.ac, .5);
    const p90Ac = percentile(ctx.acSeries.length ? ctx.acSeries : metricSeries.ac, .9);

    const sizeScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.small] || 20;
    const oddEvenScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.odd] || 20;
    const zoneDiff = Math.abs(base.metrics.z1 - 2) + Math.abs(base.metrics.z2 - 2) + Math.abs(base.metrics.z3 - 2);
    const zoneScore = clamp(100 - zoneDiff * 22, 24, 100);
    const sumScore = valueScoreByDistance(base.metrics.sum, p10Sum, p50Sum, p90Sum);
    const spanScore = valueScoreByDistance(base.metrics.span, p10Span, p50Span, p90Span);
    const acScore = valueScoreByDistance(base.metrics.ac, p10Ac, p50Ac, p90Ac);
    const tailScore = base.metrics.tailPattern === '全不同尾' ? 96 : (base.metrics.tailPattern === '全同尾' ? 8 : 72);
    let runScore = 90;
    if (base.metrics.runLabel === '1组2连') runScore = 80;
    else if (base.metrics.runLabel === '2连+2连') runScore = 72;
    else if (base.metrics.runLabel === '1组3连') runScore = 58;
    else if (['1组4连', '1组5连', '全6连号', '3连+2连', '4连+2连'].includes(base.metrics.runLabel)) runScore = 16;

    const maxRedCount = Math.max(1, ...(ctx.redCounts || redFreq).slice(1));
    const maxBlueCount = Math.max(1, ...(ctx.blueCounts || blueFreq).slice(1));
    const redCounts = ctx.redCounts || redFreq;
    const blueCounts = ctx.blueCounts || blueFreq;
    const numberFreqScore = clamp(Math.round(avg(reds.map(n => (redCounts[n] || 0) / maxRedCount)) * 100), 20, 100);
    const blueFreqScore = blue !== null ? clamp(Math.round(((blueCounts[blue] || 0) / maxBlueCount) * 100), 20, 100) : 50;

    const balance = Math.round(sizeScore*.16 + oddEvenScore*.16 + zoneScore*.2 + sumScore*.14 + spanScore*.09 + acScore*.09 + tailScore*.06 + runScore*.05 + numberFreqScore*.03 + blueFreqScore*.02);
    return { prevalence, balance };
  }

  function buildHistoricalProfilesNoLeak() {
    const perTypeCounts = Object.fromEntries(Object.keys(typeMeta).map(type => [type, {}]));
    const redCounts = Array(34).fill(0);
    const blueCounts = Array(17).fill(0);
    const sumSeries = [];
    const spanSeries = [];
    const acSeries = [];
    const profiles = {};

    for (const draw of drawsAsc) {
      const historyCount = sumSeries.length;
      const percentileByType = getTypePercentileMapByCounts(perTypeCounts, historyCount);
      const base = inputShapes(draw.reds, draw.blue);
      const { prevalence, balance } = historyCount === 0
        ? { prevalence: 50, balance: 50 }
        : computeBalanceAndPrevalence(base, draw.reds, draw.blue, {
            percentileByType,
            redCounts,
            blueCounts,
            sumSeries,
            spanSeries,
            acSeries,
          });
      const rawScore = clamp(Math.round(prevalence*.52 + balance*.40 + 8), 1, 99);
      profiles[draw.issue] = {
        score: rawScore,
        prevalence,
        balance,
        grade: getGrade(rawScore),
        historyCount,
        asOfIssue: draw.issue,
        asOfDate: draw.date,
      };

      draw.reds.forEach(n => { redCounts[n] += 1; });
      blueCounts[draw.blue] += 1;
      sumSeries.push(draw.metrics.sum);
      spanSeries.push(draw.metrics.span);
      acSeries.push(draw.metrics.ac);
      draw.shape_refs.forEach(ref => {
        const id = `${ref.type}::${ref.key}`;
        perTypeCounts[ref.type][id] = (perTypeCounts[ref.type][id] || 0) + 1;
      });
    }
    return profiles;
  }

  const historicalProfilesV6 = buildHistoricalProfilesNoLeak();

  function buildBandSystemV6() {
    const out = {};
    AXES.forEach(axis => {
      const width = BAND_WIDTH[axis] || 4;
      const recordsAsc = drawsAsc
        .map((draw, idx) => ({ draw, idx: idx + 1, hist: historicalProfilesV6[draw.issue] }))
        .filter(item => item.hist && Number.isFinite(item.hist[axis]));
      const total = recordsAsc.length;
      const bandMap = new Map();
      recordsAsc.forEach(item => {
        const value = clamp(Math.round(item.hist[axis]), 1, 99);
        const min = Math.floor((value - 1) / width) * width + 1;
        const max = Math.min(min + width - 1, 99);
        const key = `${min}-${max}`;
        if (!bandMap.has(key)) {
          bandMap.set(key, {
            axis,
            min,
            max,
            label: `${min}-${max}`,
            count: 0,
            rate: 0,
            fit: 0,
            densityTier: '稀疏带',
            tone: 'red',
            values: [],
            indices: [],
            recent_records: [],
            first_seen_issue: null,
            first_seen_date: null,
            last_seen_issue: null,
            last_seen_date: null,
            current_gap: null,
            avg_gap: null,
            median_gap: null,
            p80_gap: null,
            p90_gap: null,
            max_gap: null,
          });
        }
        const band = bandMap.get(key);
        band.count += 1;
        band.values.push(value);
        band.indices.push(item.idx);
        band.recent_records.push({
          issue: item.draw.issue,
          date: item.draw.date,
          reds: item.draw.reds,
          blue: item.draw.blue,
          sum: item.draw.metrics.sum,
          span: item.draw.metrics.span,
          ac: item.draw.metrics.ac,
          value,
        });
      });
      const bands = [...bandMap.values()].sort((a,b)=>a.min - b.min);
      const maxRate = bands.length ? Math.max(...bands.map(b => total ? b.count / total : 0)) : 0;
      bands.forEach(band => {
        band.rate = total ? band.count / total : 0;
        band.fit = maxRate ? Math.round(band.rate / maxRate * 100) : 0;
        if (band.rate >= maxRate * 0.85) {
          band.densityTier = '主密集带';
          band.tone = 'green';
        } else if (band.rate >= maxRate * 0.60) {
          band.densityTier = '次密集带';
          band.tone = 'blue';
        } else if (band.rate >= maxRate * 0.35) {
          band.densityTier = '常规带';
          band.tone = 'yellow';
        } else {
          band.densityTier = '稀疏带';
          band.tone = 'red';
        }
        band.first_seen_issue = band.recent_records[0]?.issue || null;
        band.first_seen_date = band.recent_records[0]?.date || null;
        const lastRec = band.recent_records[band.recent_records.length - 1] || null;
        band.last_seen_issue = lastRec?.issue || null;
        band.last_seen_date = lastRec?.date || null;
        const gaps = [];
        for (let i = 1; i < band.indices.length; i++) gaps.push(band.indices[i] - band.indices[i - 1]);
        band.current_gap = band.indices.length ? total - band.indices[band.indices.length - 1] : total;
        band.avg_gap = gaps.length ? Math.round(avg(gaps) * 10) / 10 : null;
        band.median_gap = gaps.length ? Math.round(percentile([...gaps].sort((a,b)=>a-b), .5) * 10) / 10 : null;
        band.p80_gap = gaps.length ? Math.round(percentile([...gaps].sort((a,b)=>a-b), .8) * 10) / 10 : null;
        band.p90_gap = gaps.length ? Math.round(percentile([...gaps].sort((a,b)=>a-b), .9) * 10) / 10 : null;
        band.max_gap = gaps.length ? Math.max(...gaps) : null;
        band.recent_records = band.recent_records.slice(-8).reverse();
      });
      const sortedByRate = [...bands].sort((a,b)=>b.rate - a.rate || a.min - b.min);
      out[axis] = {
        axis,
        total,
        maxRate,
        bands,
        sortedByRate,
        topBand: sortedByRate[0] || null,
        topCoverage3: sortedByRate.slice(0,3).reduce((acc, item) => acc + item.rate, 0),
      };
    });
    return out;
  }

  const bandSystemV6 = buildBandSystemV6();

  function getBandArchiveV6(axis, value) {
    const system = bandSystemV6[axis];
    if (!system) return null;
    const width = BAND_WIDTH[axis] || 4;
    const safe = clamp(Math.round(value), 1, 99);
    const min = Math.floor((safe - 1) / width) * width + 1;
    const max = Math.min(min + width - 1, 99);
    return system.bands.find(item => item.min === min && item.max === max) || {
      axis,
      min,
      max,
      label: `${min}-${max}`,
      count: 0,
      rate: 0,
      fit: 0,
      densityTier: '未命中带',
      tone: 'red',
      recent_records: [],
      current_gap: null,
      avg_gap: null,
      median_gap: null,
      p80_gap: null,
      p90_gap: null,
      max_gap: null,
    };
  }

  function bandBadgeV6(axis, value) {
    const band = getBandArchiveV6(axis, value);
    return labelPill(`${AXIS_LABEL[axis]} ${band.min}-${band.max} · ${band.densityTier}`, band.tone || 'blue');
  }

  function bandExplainV6(axis, band) {
    if (!band) return '';
    const axisLabel = AXIS_LABEL[axis];
    if (band.densityTier === '主密集带') return `${axisLabel}落在 ${band.min}-${band.max}，这是历史上最集中的区间之一。这里的含义不是“更容易中”，而是“更像历史已开出号码常见落点”。`;
    if (band.densityTier === '次密集带') return `${axisLabel}落在 ${band.min}-${band.max}，属于历史上相对集中的次主区间。`; 
    if (band.densityTier === '常规带') return `${axisLabel}落在 ${band.min}-${band.max}，属于历史上正常会出现的中间区间。`;
    return `${axisLabel}落在 ${band.min}-${band.max}，历史上也会出现，但相对更分散、更少见。`;
  }

  candidateProfile = function(reds, blue, opts = state.recommend.options) {
    const base = inputShapes(reds, blue);
    const matchedStats = base.refs.map(ref => shapeMap[ref.id] ? { ...shapeMap[ref.id], display: ref.display } : synthStat(ref));
    const prevalenceBase = matchedStats
      .filter(s => s.type !== 'special_shape')
      .map(s => typeFreqPercentile[s.id] !== undefined ? typeFreqPercentile[s.id] : 0.5);
    const prevalence = Math.round(avg(prevalenceBase) * 100);

    const p10Sum = percentile(metricSeries.sum, .1), p50Sum = percentile(metricSeries.sum, .5), p90Sum = percentile(metricSeries.sum, .9);
    const p10Span = percentile(metricSeries.span, .1), p50Span = percentile(metricSeries.span, .5), p90Span = percentile(metricSeries.span, .9);
    const p10Ac = percentile(metricSeries.ac, .1), p50Ac = percentile(metricSeries.ac, .5), p90Ac = percentile(metricSeries.ac, .9);
    const sizeScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.small] || 20;
    const oddEvenScore = [20, 52, 80, 100, 80, 52, 20][base.metrics.odd] || 20;
    const zoneDiff = Math.abs(base.metrics.z1 - 2) + Math.abs(base.metrics.z2 - 2) + Math.abs(base.metrics.z3 - 2);
    const zoneScore = clamp(100 - zoneDiff * 22, 24, 100);
    const sumScore = valueScoreByDistance(base.metrics.sum, p10Sum, p50Sum, p90Sum);
    const spanScore = valueScoreByDistance(base.metrics.span, p10Span, p50Span, p90Span);
    const acScore = valueScoreByDistance(base.metrics.ac, p10Ac, p50Ac, p90Ac);
    const tailScore = base.metrics.tailPattern === '全不同尾' ? 96 : (base.metrics.tailPattern === '全同尾' ? 8 : 72);
    let runScore = 90;
    if (base.metrics.runLabel === '1组2连') runScore = 80;
    else if (base.metrics.runLabel === '2连+2连') runScore = 72;
    else if (base.metrics.runLabel === '1组3连') runScore = 58;
    else if (['1组4连', '1组5连', '全6连号', '3连+2连', '4连+2连'].includes(base.metrics.runLabel)) runScore = 16;
    const numberFreqScore = clamp(Math.round(avg(reds.map(n => redFreq[n] / Math.max(...redFreq))) * 100), 20, 100);
    const blueFreqScore = blue !== null ? clamp(Math.round((blueFreq[blue] / Math.max(...blueFreq)) * 100), 20, 100) : 50;
    const balance = Math.round(sizeScore*.16 + oddEvenScore*.16 + zoneScore*.2 + sumScore*.14 + spanScore*.09 + acScore*.09 + tailScore*.06 + runScore*.05 + numberFreqScore*.03 + blueFreqScore*.02);

    const ruleHits = [];
    let penalty = 0;
    const specials = base.refs.filter(r => r.type === 'special_shape').map(r => r.key);
    if (opts.excludeAllOddEven && (base.metrics.odd === 6 || base.metrics.even === 6)) { ruleHits.push('全奇/全偶'); penalty += 16; }
    if (opts.excludeSameTail && base.metrics.tailPattern === '全同尾') { ruleHits.push('全同尾'); penalty += 18; }
    if (opts.excludeFullRun && base.metrics.runLabel === '全6连号') { ruleHits.push('全6连号'); penalty += 20; }
    if (opts.excludeRareRun && ['1组5连','1组4连','3连+2连','4连+2连'].includes(base.metrics.runLabel)) { ruleHits.push('罕见长连号'); penalty += 16; }
    if (opts.excludeZoneBreak && base.metrics.breakParts.length) { ruleHits.push('断区形态'); penalty += 14; }
    if (opts.excludeLowSum && base.metrics.sum <= 60) { ruleHits.push('极低和值'); penalty += 12; }
    if (opts.excludeHighSum && base.metrics.sum >= 140) { ruleHits.push('极高和值'); penalty += 12; }
    if (opts.excludeLowAC && base.metrics.ac <= 2) { ruleHits.push('极低AC'); penalty += 12; }
    if (opts.excludeHighAC && base.metrics.ac >= 9) { ruleHits.push('极高AC'); penalty += 10; }
    if (opts.excludeRedBlueSame && blue !== null && reds.includes(blue)) { ruleHits.push('红蓝同号'); penalty += 9; }
    if (opts.excludeHistoricalDuplicate && base.metrics.exactIssue) { ruleHits.push('历史完全重复'); penalty += 22; }
    if (opts.avoidLatestOverlap && base.metrics.latestOverlap >= 4) { ruleHits.push('与最新一期高重合'); penalty += 10; }
    if (opts.preferBalanced && balance < 62) { ruleHits.push('均衡度不足'); penalty += 8; }

    const specialStats = matchedStats.filter(s => s.type === 'special_shape' || s.kind === 'special').sort((a,b)=>a.occurrence_count - b.occurrence_count);
    const penaltyScore = clamp(100 - penalty, 0, 100);
    const rawScore = clamp(prevalence*.52 + balance*.40 + penaltyScore*.08 - ruleHits.length*2, 1, 99);
    const score = Math.round(rawScore * 10) / 10;
    const grade = getGrade(score);

    const scoreBand = getBandArchiveV6('score', rawScore);
    const prevalenceBand = getBandArchiveV6('prevalence', prevalence);
    const balanceBand = getBandArchiveV6('balance', balance);
    const rawBandFit = prevalenceBand.fit * 0.45 + balanceBand.fit * 0.35 + scoreBand.fit * 0.20;
    const bandFit = Math.round(rawBandFit * 10) / 10;
    const rawRecommendScore = clamp(rawScore * 0.58 + rawBandFit * 0.42, 1, 99);
    const recommendScore = Math.round(rawRecommendScore * 10) / 10;

    const reasons = [];
    if (prevalenceBand.densityTier === '主密集带') reasons.push('常见度落入历史主密集带');
    if (balanceBand.densityTier === '主密集带') reasons.push('均衡度落入历史主密集带');
    if (scoreBand.densityTier === '主密集带') reasons.push('综合评分落入历史主密集带');
    if (base.metrics.z1 === 2 && base.metrics.z2 === 2 && base.metrics.z3 === 2) reasons.push('三区分布均衡');
    if (base.metrics.odd === 3 && base.metrics.small === 3) reasons.push('奇偶/大小接近中性');
    if (!specials.length) reasons.push('未触发特殊形态');
    if (base.metrics.latestOverlap <= 2) reasons.push('与最新一期重合较低');
    if (!reasons.length) reasons.push('通过当前推荐排序逻辑');

    return {
      reds: [...reds].sort((a,b)=>a-b),
      blue,
      base,
      matchedStats,
      prevalence,
      balance,
      penaltyScore,
      score,
      grade,
      scoreBand,
      prevalenceBand,
      balanceBand,
      rawScore,
      bandFit,
      rawBandFit,
      recommendScore,
      rawRecommendScore,
      ruleHits,
      specialStats,
      reasons,
      key: [...reds].sort((a,b)=>a-b).join('-') + '|' + blue,
    };
  };

  sortRecommendList = function(list, key) {
    const arr = [...list];
    const rec = v => v.rawRecommendScore ?? v.recommendScore;
    const fit = v => v.rawBandFit ?? v.bandFit;
    const sc = v => v.rawScore ?? v.score;
    if (key === 'recommend_desc') arr.sort((a,b)=>rec(b) - rec(a) || fit(b) - fit(a) || sc(b) - sc(a) || a.key.localeCompare(b.key,'zh-CN'));
    else if (key === 'bandfit_desc') arr.sort((a,b)=>fit(b) - fit(a) || rec(b) - rec(a) || sc(b) - sc(a));
    else if (key === 'score_desc') arr.sort((a,b)=>sc(b) - sc(a) || fit(b) - fit(a) || a.key.localeCompare(b.key,'zh-CN'));
    else if (key === 'prevalence_desc') arr.sort((a,b)=>b.prevalence - a.prevalence || rec(b) - rec(a));
    else if (key === 'balance_desc') arr.sort((a,b)=>b.balance - a.balance || rec(b) - rec(a));
    else if (key === 'explore_sparse') arr.sort((a,b)=>fit(a) - fit(b) || sc(b) - sc(a));
    return arr;
  };

generateRecommendations = function() {
    state.recommend.options = readRecommendOptions();
    const opts = state.recommend.options;
    const pool = [];
    const seen = new Set();
    const attempts = opts.preferBalanced ? 22000 : 18000;

    for (let i = 0; i < attempts; i++) {
      const cand = randomCandidate();
      const profile = candidateProfile(cand.reds, cand.blue, opts);
      if (profile.ruleHits.length) continue;
      if (seen.has(profile.key)) continue;
      seen.add(profile.key);
      pool.push(profile);
    }

    const ranked = pool.sort((a,b)=>
      (b.rawRecommendScore ?? b.recommendScore) - (a.rawRecommendScore ?? a.recommendScore) ||
      (b.rawBandFit ?? b.bandFit) - (a.rawBandFit ?? a.bandFit) ||
      (b.rawScore ?? b.score) - (a.rawScore ?? a.score) ||
      a.key.localeCompare(b.key, 'zh-CN')
    );

    const scoreBandKey = item => `${item.scoreBand.min}-${item.scoreBand.max}`;
    const prevalenceBandKey = item => `${item.prevalenceBand.min}-${item.prevalenceBand.max}`;
    const balanceBandKey = item => `${item.balanceBand.min}-${item.balanceBand.max}`;
    const comboKey = item => [prevalenceBandKey(item), balanceBandKey(item), scoreBandKey(item)].join('|');
    const recBucketKey = item => `${Math.floor((item.rawRecommendScore ?? item.recommendScore) / 2) * 2}`;
    const fitBucketKey = item => `${Math.floor((item.rawBandFit ?? item.bandFit) / 4) * 4}`;
    const scoreBucketKey = item => `${Math.floor((item.rawScore ?? item.score) / 3) * 3}`;

    const shortlist = [];
    const scoreBandSeed = {};
    const comboSeed = {};
    for (const item of ranked) {
      const sb = scoreBandKey(item);
      const cb = comboKey(item);
      if ((comboSeed[cb] || 0) >= 70) continue;
      if ((scoreBandSeed[sb] || 0) >= 240 && shortlist.length >= 520) continue;
      shortlist.push(item);
      scoreBandSeed[sb] = (scoreBandSeed[sb] || 0) + 1;
      comboSeed[cb] = (comboSeed[cb] || 0) + 1;
      if (shortlist.length >= 1100) break;
    }

    const selected = [];
    const redUse = {};
    const blueUse = {};
    const scoreBandUse = {};
    const prevalenceBandUse = {};
    const balanceBandUse = {};
    const comboUse = {};
    const recBucketUse = {};
    const fitBucketUse = {};
    const scoreBucketUse = {};

    function updateUsage(item) {
      item.reds.forEach(n => { redUse[n] = (redUse[n] || 0) + 1; });
      blueUse[item.blue] = (blueUse[item.blue] || 0) + 1;
      scoreBandUse[scoreBandKey(item)] = (scoreBandUse[scoreBandKey(item)] || 0) + 1;
      prevalenceBandUse[prevalenceBandKey(item)] = (prevalenceBandUse[prevalenceBandKey(item)] || 0) + 1;
      balanceBandUse[balanceBandKey(item)] = (balanceBandUse[balanceBandKey(item)] || 0) + 1;
      comboUse[comboKey(item)] = (comboUse[comboKey(item)] || 0) + 1;
      recBucketUse[recBucketKey(item)] = (recBucketUse[recBucketKey(item)] || 0) + 1;
      fitBucketUse[fitBucketKey(item)] = (fitBucketUse[fitBucketKey(item)] || 0) + 1;
      scoreBucketUse[scoreBucketKey(item)] = (scoreBucketUse[scoreBucketKey(item)] || 0) + 1;
    }

    function effectiveSetScore(item) {
      const rawRec = item.rawRecommendScore ?? item.recommendScore;
      const rawFit = item.rawBandFit ?? item.bandFit;
      const rawScore = item.rawScore ?? item.score;
      const sb = scoreBandKey(item);
      const pb = prevalenceBandKey(item);
      const bb = balanceBandKey(item);
      const cb = comboKey(item);
      const rb = recBucketKey(item);
      const fb = fitBucketKey(item);
      const scb = scoreBucketKey(item);

      let score = rawRec * 1000 + rawFit * 8 + rawScore;

      if (!scoreBandUse[sb]) score += 240;
      if (!prevalenceBandUse[pb]) score += 120;
      if (!balanceBandUse[bb]) score += 110;
      if (!comboUse[cb]) score += 280;
      if (!recBucketUse[rb]) score += 90;
      if (!fitBucketUse[fb]) score += 75;
      if (!scoreBucketUse[scb]) score += 100;

      score -= (scoreBandUse[sb] || 0) * 190;
      score -= (prevalenceBandUse[pb] || 0) * 105;
      score -= (balanceBandUse[bb] || 0) * 95;
      score -= (comboUse[cb] || 0) * 280;
      score -= (recBucketUse[rb] || 0) * 90;
      score -= (fitBucketUse[fb] || 0) * 80;
      score -= (scoreBucketUse[scb] || 0) * 110;

      let repeatedReds = 0;
      let hardRedCap = false;
      let redPenalty = 0;
      item.reds.forEach(n => {
        const used = redUse[n] || 0;
        redPenalty += used * 150;
        if (used >= 1) repeatedReds += 1;
        if (used >= 2) hardRedCap = true;
      });
      if (hardRedCap) return -Infinity;
      score -= redPenalty;
      if (repeatedReds >= 3) score -= 320;
      else if (repeatedReds === 2) score -= 140;

      const blueUsed = blueUse[item.blue] || 0;
      if (blueUsed >= 2) return -Infinity;
      score -= blueUsed * 180;

      if (selected.length) {
        const overlaps = selected.map(s => countOverlap(s.reds, item.reds));
        const maxOverlap = Math.max(...overlaps);
        const totalOverlap = overlaps.reduce((a,b)=>a+b,0);
        if (maxOverlap >= 4) return -Infinity;
        score -= maxOverlap * maxOverlap * 140;
        score -= totalOverlap * 36;
      }

      const freshReds = item.reds.filter(n => !redUse[n]).length;
      score += freshReds * 22;
      score += Math.random() * 0.0001;
      return score;
    }

    while (selected.length < 5 && shortlist.length) {
      let bestIndex = -1;
      let bestScore = -Infinity;

      for (let i = 0; i < shortlist.length; i++) {
        const item = shortlist[i];
        if (selected.find(s => s.key === item.key)) continue;
        const eff = effectiveSetScore(item);
        if (eff > bestScore) {
          bestScore = eff;
          bestIndex = i;
        }
      }

      if (bestIndex === -1) break;
      const picked = shortlist.splice(bestIndex, 1)[0];
      picked.setPickScore = Math.round(bestScore * 10) / 10;
      selected.push(picked);
      updateUsage(picked);
    }

    for (const item of ranked) {
      if (selected.length >= 5) break;
      if (selected.find(s => s.key === item.key)) continue;
      const eff = effectiveSetScore(item);
      if (!Number.isFinite(eff)) continue;
      item.setPickScore = Math.round(eff * 10) / 10;
      selected.push(item);
      updateUsage(item);
    }

    state.recommend.lastList = sortRecommendList(selected, state.recommend.sort);
    renderTabContent();
  };

          <div class="helper">核心变化：综合评分不是“高就更好”，而是“落在哪个历史评分带”。推荐排序分才是当前个人使用场景下的排序值。</div>
          <div class="accordion-list" style="margin-top:10px">
            <details class="acc"><summary><div class="acc-left"><div class="acc-title">综合评分</div><div class="acc-sub">原始结构分，不等于推荐排序分</div></div></summary><div class="acc-body"><div class="acc-sub">综合评分 = 0.52×历史常见度 + 0.40×结构均衡度 + 0.08×保留分 − 规则命中轻微修正。它只描述这组号码在当前模型里的结构位置。</div></div></details>
            <details class="acc"><summary><div class="acc-left"><div class="acc-title">评分带形态</div><div class="acc-sub">把综合评分、常见度、均衡度都按 4 分宽区间分箱</div></div></summary><div class="acc-body"><div class="acc-sub">例如 69-72、73-76。每个区间统计历史占比、当前遗漏、平均间隔。区间本身视为一种形态。</div></div></details>
            <details class="acc"><summary><div class="acc-left"><div class="acc-title">密集带贴合度</div><div class="acc-sub">看三条评分轴是否落入历史高密集区间</div></div></summary><div class="acc-body"><div class="acc-sub">优先看常见度带和均衡度带，其次看综合评分带。带内历史占比越高，贴合度越高。</div></div></details>
            <details class="acc"><summary><div class="acc-left"><div class="acc-title">推荐排序分</div><div class="acc-sub">当前推荐页真正用来排序的分</div></div></summary><div class="acc-body"><div class="acc-sub">推荐排序分 = 0.58×综合评分 + 0.42×密集带贴合度。它表示“结构本身不过分极端，同时更贴近历史主密集评分带”。</div></div></details>
          </div>
        </div>
      </details>
    `;
  }

  renderArchive = function() {
    let list = [...shapeStats];
    if (state.archive.kind === 'regular') list = list.filter(s => s.kind !== 'special');
    if (state.archive.kind === 'special') list = list.filter(s => s.kind === 'special');
    if (state.archive.type) list = list.filter(s => s.type === state.archive.type);
    if (state.archive.keyword.trim()) {
      const q = state.archive.keyword.trim().toLowerCase();
      list = list.filter(s => `${s.display} ${s.group} ${s.type_label}`.toLowerCase().includes(q));
    }
    list = sortStats(list, state.archive.sort);
    const types = Object.entries(typeMeta).sort((a,b)=>(a[1].group + a[1].label).localeCompare(b[1].group + b[1].label, 'zh-CN'));
    return `
      <section class="card section-card">
        <div class="section-head"><h2>形态档案</h2><div class="sub">常规形态、特殊形态和评分带形态统一归档，全部默认收起。</div></div>
        <div class="toolbar">
          <div class="toolbar-row">
            <select class="select" onchange="state.archive.kind=this.value;renderTabContent()">
              <option value="all" ${state.archive.kind==='all'?'selected':''}>全部档案</option>
              <option value="regular" ${state.archive.kind==='regular'?'selected':''}>常规形态</option>
              <option value="special" ${state.archive.kind==='special'?'selected':''}>特殊形态</option>
            </select>
            <select class="select" onchange="state.archive.type=this.value;renderTabContent()">
              <option value="">全部类型</option>
              ${types.map(([type, meta]) => `<option value="${type}" ${state.archive.type===type?'selected':''}>${meta.group} / ${meta.label}</option>`).join('')}
            </select>
            <select class="select" onchange="state.archive.sort=this.value;renderTabContent()">
              <option value="rate_desc" ${state.archive.sort==='rate_desc'?'selected':''}>按历史频率从高到低</option>
              <option value="rate_asc" ${state.archive.sort==='rate_asc'?'selected':''}>按历史频率从低到高</option>
              <option value="gap_desc" ${state.archive.sort==='gap_desc'?'selected':''}>按当前遗漏从高到低</option>
              <option value="name" ${state.archive.sort==='name'?'selected':''}>按名称</option>
            </select>
            <input class="input" style="max-width:260px" placeholder="搜索形态名称 / 分组" value="${escapeHtml(state.archive.keyword)}" oninput="state.archive.keyword=this.value" />
            <button class="btn secondary" onclick="renderTabContent()">筛选</button>
          </div>
        </div>
      </section>
      ${renderScoreBandArchiveGroup('综合评分带档案', 'score')}
      ${renderScoreBandArchiveGroup('历史常见度带档案', 'prevalence')}
      ${renderScoreBandArchiveGroup('结构均衡度带档案', 'balance')}
      ${renderFormulaGuide()}
      <details class="group-acc card" open>
        <summary>号码形态档案（${list.length} 条）</summary>
        <div class="group-body"><div class="accordion-list">${list.map(renderShapeAccordion).join('')}</div></div>
      </details>
    `;
  };

  state.recommend.sort = 'recommend_desc';
  window.state = state;
  window.draws = draws;
  window.latestDraw = latestDraw;
  window.switchTab = switchTab;
  window.renderTabContent = renderTabContent;
  window.analyzeCurrentNumbers = analyzeCurrentNumbers;
  window.generateRecommendations = generateRecommendations;
    renderAll();
})();

</script>

  async function decodeJson(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    if (!('DecompressionStream' in window)) {
      throw new Error('当前浏览器不支持 DecompressionStream，建议用最新版 Chrome 或 Edge 打开。');
    }
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const text = await new Response(stream).text();
    return JSON.parse(text);
  }
  async function boot() {
    try {
      window.DATA = await decodeJson(COMPRESSED_DATA_B64);
      const codeEl = document.getElementById(APP_CODE_ID);
      const code = codeEl ? codeEl.textContent : '';
